[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

# Xray process management with auto-restart
[program:xray]
command=/usr/local/bin/xray -c /etc/xray/config.json
autostart=true
autorestart=true
startsecs=5
retries=3
stopwaitsecs=10
redirect_stderr=true
stdout_logfile=/var/log/supervisor/xray.log
stdout_logfile_maxbytes=10485760
stdout_logfile_backups=5

# Health check (restart if CPU usage is too high, etc.)
[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# Auto-restart failed processes
[eventlistener:processes]
buffer_size=100
events=PROCESS_STATE
directory=/etc/supervisor/events
